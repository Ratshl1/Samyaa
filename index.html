<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funny Question</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:linear-gradient(to bottom,#08142d,#020611);
    color:white;
}

/* النجوم */
.stars{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
    pointer-events:none;
}

.star{
    position:absolute;
    background:white;
    border-radius:50%;
    animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
    from{
        opacity:0.2;
        transform:scale(1);
    }
    to{
        opacity:1;
        transform:scale(1.5);
    }
}

/* القمر */
.moon{
    position:fixed;
    top:50px;
    left:70px;
    width:70px;
    height:70px;
    border-radius:50%;
    background:#f5f5dc;
    box-shadow:
        0 0 20px #fff,
        0 0 40px #fff,
        0 0 60px rgba(255,255,255,0.5);
    z-index:1;
}

/* صورة التنين */
.dragon{
    position:fixed;
    right:-120px;
    top:50%;
    transform:translateY(-50%);
    width:340px;
    max-width:45vw;
    z-index:2;
    pointer-events:none;

    filter:
        drop-shadow(0 0 20px rgba(0,255,255,.8))
        drop-shadow(0 0 40px rgba(0,255,255,.5));
}

/* المحتوى */
.container{
    position:relative;
    z-index:100;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.question{
    font-size:28px;
    font-weight:bold;
    margin-bottom:25px;
    text-shadow:0 0 15px rgba(255,255,255,.4);
}

/* الأزرار */
.buttons{
    display:flex;
    gap:15px;
    position:relative;
}

.btn{
    border:none;
    border-radius:12px;
    padding:12px 30px;
    font-size:18px;
    cursor:pointer;
    color:white;
    transition:0.2s;
    box-shadow:0 6px 0 rgba(0,0,0,.35);
}

.btn:active{
    transform:translateY(4px);
    box-shadow:0 2px 0 rgba(0,0,0,.35);
}

#yesBtn{
    background:linear-gradient(#18d95c,#0a8d37);
}

#noBtn{
    background:linear-gradient(#ff5b5b,#c62828);
}

.message{
    margin-top:25px;
    font-size:24px;
    color:#ffe600;
    text-shadow:0 0 10px rgba(255,230,0,.8);
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>
<div class="moon"></div>

<!-- الصورة الجديدة -->
<img
    class="dragon"
    src="Cutouts_1782422520108.png"
    alt="Dragon">

<div class="container">

    <div class="question">
        is samya is a dumb little girl ?
    </div>

    <div class="buttons" id="buttonContainer">
        <button id="yesBtn" class="btn">Yes</button>
        <button id="noBtn" class="btn">No</button>
    </div>

    <div id="message" class="message"></div>

</div>

<script>
// إنشاء النجوم
const starsContainer = document.getElementById("stars");

for(let i=0;i<80;i++){
    const star = document.createElement("div");
    star.classList.add("star");

    const size = Math.random()*3 + 1;

    star.style.width = size + "px";
    star.style.height = size + "px";
    star.style.left = Math.random()*100 + "%";
    star.style.top = Math.random()*100 + "%";
    star.style.animationDelay = Math.random()*3 + "s";

    starsContainer.appendChild(star);
}

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const message = document.getElementById("message");

// زر No يهرب
function moveNoButton(){

    const btnWidth = noBtn.offsetWidth;
    const btnHeight = noBtn.offsetHeight;

    const maxX = window.innerWidth - btnWidth - 20;
    const maxY = window.innerHeight - btnHeight - 20;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    noBtn.style.position = "fixed";
    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
}

noBtn.addEventListener("mouseover", moveNoButton);
noBtn.addEventListener("click", moveNoButton);

// زر Yes
yesBtn.addEventListener("click", () => {
    message.textContent = "you have good eyes kidoo";
});
</script>

</body>
</html>
