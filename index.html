<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Funny Question</title>

<style>
  body{
    margin:0;
    height:100vh;
    font-family: Arial, sans-serif;
    overflow:hidden;
    background: radial-gradient(circle at top, #0b1b3a, #050814);
    color:white;
  }

  /* نجوم بسيطة */
  body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
      radial-gradient(2px 2px at 20px 30px, white, transparent),
      radial-gradient(2px 2px at 80px 120px, white, transparent),
      radial-gradient(1px 1px at 200px 80px, white, transparent),
      radial-gradient(1px 1px at 300px 200px, white, transparent),
      radial-gradient(2px 2px at 400px 50px, white, transparent);
    opacity:0.6;
    pointer-events:none;
  }

  .container{
    width:100%;
    height:100%;
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }

  h1{
    font-size:22px;
    margin-bottom:20px;
    z-index:2;
  }

  .buttons{
    display:flex;
    gap:15px;
    z-index:2;
  }

  .btn{
    padding:12px 25px;
    font-size:16px;
    border:none;
    cursor:pointer;
    border-radius:8px;
  }

  #yesBtn{
    background:green;
    color:white;
  }

  #noBtn{
    background:red;
    color:white;
    position:absolute;
  }

  #msg{
    margin-top:20px;
    font-size:20px;
    color:yellow;
    z-index:2;
  }

  /* الصورة أقصى اليمين */
  .dragon{
    position:fixed;
    right:-40px; /* جزء منها يخرج خارج الشاشة */
    top:50%;
    transform:translateY(-50%);
    max-width:250px;
    z-index:1;
    pointer-events:none;
  }

</style>
</head>

<body>

<div class="container">

  <img class="dragon" src="HEIF Image.heic" alt="dragon">

  <h1>is samya is a dumb little girl ?</h1>

  <div class="buttons">
    <button id="yesBtn" class="btn">yes</button>
    <button id="noBtn" class="btn">no</button>
  </div>

  <div id="msg"></div>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const msg = document.getElementById("msg");

function moveButton(){
  const padding = 10;
  const maxX = window.innerWidth - noBtn.offsetWidth - padding;
  const maxY = window.innerHeight - noBtn.offsetHeight - padding;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

yesBtn.addEventListener("click", () => {
  msg.textContent = "you have good eyes kidoo";
});

// أول مكان
moveButton();
</script>

</body>
</html>
