<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samya Test</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    position:relative;
}

/* Dragon */

.dragon{
    position:absolute;
    right:0;
    bottom:0;
    height:100vh;
    max-width:45%;
    object-fit:contain;
    pointer-events:none;
    filter:
        drop-shadow(0 0 20px rgba(255,255,255,.2))
        drop-shadow(0 0 40px rgba(255,255,255,.1));
}

/* Main Card */

.container{
    z-index:10;
    text-align:center;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.15);

    padding:40px;
    border-radius:25px;

    box-shadow:
        0 0 30px rgba(255,255,255,.08);
}

h1{
    font-size:2rem;
    margin-bottom:30px;
}

/* Buttons Area */

.buttons{
    position:relative;
    width:320px;
    height:160px;
    margin:auto;
}

button{
    border:none;
    border-radius:15px;
    padding:14px 35px;
    font-size:20px;
    cursor:pointer;
    transition:.2s;
}

#yesBtn{
    background:#22c55e;
    color:white;
    margin-right:20px;
}

#yesBtn:hover{
    transform:scale(1.08);
}

#noBtn{
    background:#ef4444;
    color:white;
    position:absolute;
    left:180px;
    top:0;
}

.message{
    margin-top:25px;
    font-size:28px;
    font-weight:bold;
    color:#7cff7c;
}

/* Mobile */

@media(max-width:768px){

    .dragon{
        opacity:.6;
        max-width:60%;
    }

    h1{
        font-size:1.3rem;
    }

    .container{
        width:90%;
    }
}

</style>
</head>
<body>

<img src="HEIF%20Image.heic" class="dragon">

<div class="container">

<h1>Is Samya a dumb little girl?</h1>

<div class="buttons">
    <button id="yesBtn">Yes</button>
    <button id="noBtn">No</button>
</div>

<div id="message" class="message"></div>

</div>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const message = document.getElementById("message");

noBtn.addEventListener("click", () => {

    const btnWidth = noBtn.offsetWidth;
    const btnHeight = noBtn.offsetHeight;

    const maxX = window.innerWidth - btnWidth - 10;
    const maxY = window.innerHeight - btnHeight - 10;

    const randomX = Math.floor(Math.random() * maxX);
    const randomY = Math.floor(Math.random() * maxY);

    noBtn.style.position = "fixed";
    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
});

yesBtn.addEventListener("click", () => {

    message.innerHTML =
    "You have good eyes kiddo 😎";

});

</script>

</body>
</html>
