<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Funny Question</title>

<style>
  body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color:white;
    overflow:hidden;
  }

  .container{
    text-align:center;
    position:relative;
    width:100%;
    height:100%;
  }

  h1{
    margin-top:60px;
    font-size:22px;
  }

  .btn{
    padding:12px 25px;
    margin:10px;
    font-size:16px;
    border:none;
    cursor:pointer;
    border-radius:8px;
  }

  #yesBtn{
    background:green;
    color:white;
  }

  #noBtn{
    background:red;
    color:white;
    position:absolute;
  }

  #msg{
    margin-top:20px;
    font-size:20px;
    color:yellow;
  }

  .dragon{
    position:fixed;
    right:0;
    top:50%;
    transform:translateY(-50%);
    max-width:250px;
    height:auto;
  }
</style>
</head>

<body>

<div class="container">
  <img class="dragon" src="HEIF Image.heic" alt="dragon image">

  <h1>is samya is a dumb little girl ?</h1>

  <button id="yesBtn" class="btn">yes</button>
  <button id="noBtn" class="btn">no</button>

  <div id="msg"></div>
</div>

<script>
  const noBtn = document.getElementById("noBtn");
  const yesBtn = document.getElementById("yesBtn");
  const msg = document.getElementById("msg");

  function moveButton(){
    const padding = 20;
    const maxX = window.innerWidth - noBtn.offsetWidth - padding;
    const maxY = window.innerHeight - noBtn.offsetHeight - padding;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  }

  noBtn.addEventListener("mouseover", moveButton);
  noBtn.addEventListener("click", moveButton);

  yesBtn.addEventListener("click", () => {
    msg.textContent = "you have good eyes kidoo";
  });

  // initial position
  moveButton();
</script>

</body>
</html>
