<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Funny Question</title>

<style>
  body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0b1b3a, #050814);
    color:white;
  }

  /* نجوم متحركة */
  .stars{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    overflow:hidden;
    z-index:0;
  }

  .star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.6;
    animation: floatUp linear infinite;
  }

  @keyframes floatUp{
    from{
      transform: translateY(100vh);
      opacity:0;
    }
    to{
      transform: translateY(-10vh);
      opacity:1;
    }
  }

  .container{
    position:relative;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:2;
  }

  h1{
    font-size:22px;
    margin-bottom:20px;
  }

  .buttons{
    display:flex;
    gap:15px;
  }

  .btn{
    padding:12px 25px;
    font-size:16px;
    border:none;
    cursor:pointer;
    border-radius:8px;
  }

  #yesBtn{
    background:green;
    color:white;
  }

  #noBtn{
    background:red;
    color:white;
    position:absolute;
    left:calc(50% + 60px); /* مكان ثابت عند البداية */
    top:calc(50% + 40px);
  }

  #msg{
    margin-top:20px;
    font-size:20px;
    color:yellow;
  }

  /* صورة التنين أقصى اليمين أكثر */
  .dragon{
    position:fixed;
    right:-80px; /* أكثر خروجًا */
    top:50%;
    transform:translateY(-50%);
    max-width:280px;
    z-index:1;
    pointer-events:none;
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
  }

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="container">

  <img class="dragon" src="HEIF Image.heic" alt="dragon">

  <h1>is samya is a dumb little girl ?</h1>

  <div class="buttons">
    <button id="yesBtn" class="btn">yes</button>
  </div>

  <button id="noBtn" class="btn">no</button>

  <div id="msg"></div>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const msg = document.getElementById("msg");

/* زر NO يهرب داخل الشاشة */
function moveButton(){
  const padding = 20;
  const maxX = window.innerWidth - noBtn.offsetWidth - padding;
  const maxY = window.innerHeight - noBtn.offsetHeight - padding;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

/* عند التحميل لا نغير مكانه (يبقى في البداية) */

/* هروب عند التفاعل */
noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

yesBtn.addEventListener("click", () => {
  msg.textContent = "you have good eyes kidoo";
});

/* نجوم متحركة */
const starsContainer = document.getElementById("stars");

for(let i=0;i<40;i++){
  const star = document.createElement("div");
  star.className = "star";

  star.style.left = Math.random() * 100 + "vw";
  star.style.top = Math.random() * 100 + "vh";
  star.style.animationDuration = (2 + Math.random() * 5) + "s";
  star.style.opacity = Math.random();

  starsContainer.appendChild(star);
}
</script>

</body>
</html>
